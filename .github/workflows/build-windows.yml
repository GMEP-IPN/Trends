name: Build Windows EXE

on:
  workflow_dispatch:        # ручной запуск из GitHub UI
  push:
    branches:
      - master             # временный триггер для первичной индексации
    tags:
      - 'v*'               # автозапуск при пуше тега v1.0, v2.3 и т.д.

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller trends.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trends-windows
          path: dist/Trends.exe
          retention-days: 30

      # Создаёт GitHub Release и прикрепляет EXE, если запуск по тегу
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Trends.exe
          generate_release_notes: true
