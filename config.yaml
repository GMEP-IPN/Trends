# ===========================================
# Конфигурация Trends Collector
# ===========================================

# Настройки базы данных
database:
  # SQLite (по умолчанию) - просто укажите имя файла
  url: "sqlite:///trends.db"
  
  # PostgreSQL (для продакшена):
  # url: "postgresql://user:password@localhost:5432/trends"

# Настройки сбора данных
collector:
  batch_size: 10           # Записей в одном пакете
  flush_interval_sec: 5    # Интервал сброса буфера (сек)
  reconnect_delay_sec: 5   # Задержка переподключения к ПЛК

# Настройки хранения
storage:
  retention_days: 30       # Сколько дней хранить данные

# ===========================================
# Конфигурация ПЛК
# ===========================================
plcs:
  # Пример для реального ПЛК Siemens S7-1200/1500
  - name: "MainPLC"
    ip: "192.168.1.10"      # IP адрес ПЛК
    port: 102               # Порт (102 - стандартный для S7)
    rack: 0                 # Rack (обычно 0)
    slot: 1                 # Slot (S7-1200: 1, S7-300/400: 2)
    enabled: false          # Отключен для тестов
    
    # Теги для сбора
    tags:
      # Формат: DB[номер].DB[тип][адрес]
      # Типы: X=bit, B=byte, W=word(int), D=dword(dint), R=real
      
      - name: "Temperature"
        description: "Температура процесса"
        db: 1                # Номер DB блока
        address: 0           # Байтовый адрес (DBW0)
        type: "real"         # int, dint, real, bool, word
        size: 4              # Размер в байтах (real=4, int=2, bool=1)
        poll_ms: 1000        # Интервал опроса (мс)
        
      - name: "Pressure"
        description: "Давление в системе"
        db: 1
        address: 4           # DBW4 (после real идёт +4 байта)
        type: "real"
        size: 4
        poll_ms: 1000
        
      - name: "MotorRunning"
        description: "Двигатель работает"
        db: 1
        address: 8           # DBX8.0
        type: "bool"
        size: 1
        poll_ms: 500
        
      - name: "Counter"
        description: "Счётчик изделий"
        db: 1
        address: 10          # DBW10
        type: "int"
        size: 2
        poll_ms: 1000

  # Симулятор комнаты для тестирования
  - name: "SimPLC"
    ip: "127.0.0.1"
    port: 2000
    rack: 0
    slot: 1
    enabled: true           # ✅ Включён для тестов
    
    tags:
      - name: "RoomTemperature"
        description: "Температура в комнате"
        db: 1
        address: 0
        type: "real"
        size: 4
        poll_ms: 1000
        
      - name: "RoomHumidity"
        description: "Влажность в комнате"
        db: 1
        address: 4
        type: "real"
        size: 4
        poll_ms: 1000

# ===========================================
# Логирование
# ===========================================
logging:
  level: "INFO"            # DEBUG, INFO, WARNING, ERROR
  file: "logs/collector.log"
  max_size_mb: 10
  backup_count: 5

