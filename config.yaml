# ===========================================
# Trends Collector - Системные настройки
# ===========================================
# ПЛК и теги настраиваются через веб-интерфейс!

# Настройки базы данных
database:
  # SQLite (по умолчанию) - просто укажите имя файла
  url: "sqlite:///trends.db"
  
  # PostgreSQL (для продакшена):
  # url: "postgresql://user:password@localhost:5432/trends"

# Настройки сбора данных
collector:
  batch_size: 100          # Записей в одном пакете
  flush_interval_sec: 5    # Интервал сброса буфера (сек)
  reconnect_delay_sec: 5   # Задержка переподключения к ПЛК

# Настройки хранения
storage:
  retention_days: 30       # Сколько дней хранить данные

# API сервер
api:
  host: "127.0.0.1"        # Адрес сервера (0.0.0.0 для доступа извне)
  port: 8000               # Порт веб-интерфейса

# Логирование
logging:
  level: "INFO"            # DEBUG, INFO, WARNING, ERROR
  file: "logs/collector.log"
  max_size_mb: 10
  backup_count: 5
